<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · BestShopio Platform Center</title>
  <link rel="stylesheet" href="../_shared/admin-theme.css" />
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:var(--panel);color:var(--ink);min-height:100vh;display:grid;place-items:center;
      font:14px/1.5 -apple-system,"Segoe UI",Roboto,Arial,sans-serif}
    .signin-card{width:380px;background:#fff;border:1px solid var(--hair);border-radius:14px;
      box-shadow:0 6px 24px rgb(16 24 40/6%);padding:32px 30px}
    .si-brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;margin-bottom:4px}
    .si-brand .logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#0066e6,#3a8bff);
      display:grid;place-items:center;color:#fff;font-weight:800}
    .si-sub{font-size:13px;color:var(--ink-muted);margin:0 0 24px}
    .si-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-body);margin:14px 0 6px}
    .si-input{width:100%;height:40px;border:1px solid var(--ctl);border-radius:8px;padding:0 12px;font-size:14px;outline:0}
    .si-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-50)}
    .si-btn{width:100%;height:42px;margin-top:22px;border:0;border-radius:8px;background:var(--brand);color:#fff;
      font-size:14.5px;font-weight:600;cursor:pointer}
    .si-btn:hover{background:var(--brand-hover)}
    .si-foot{text-align:center;font-size:12px;color:var(--ink-muted);margin-top:18px}
  </style>
</head>
<body>
  <form class="signin-card" onsubmit="location.href='index.html';return false">
    <div class="si-brand"><span class="logo-mark">B</span>BestShopio</div>
    <p class="si-sub">Platform Center — staff sign in</p>
    <label class="si-label">Email</label>
    <input class="si-input" type="email" value="ryan@bestvoy.com" />
    <label class="si-label">Password</label>
    <input class="si-input" type="password" value="••••••••" />
    <button class="si-btn" type="submit">Sign in</button>
    <p class="si-foot">Platform staff only. Store owners use the store admin.</p>
  </form>
</body>
</html>
